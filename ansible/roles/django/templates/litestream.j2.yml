access-key-id: "{{ backblaze_key_id }}"
secret-access-key: "{{ backblaze_app_key }}"

dbs:
  - path: /data/db.sqlite3
    replicas:
      - type: s3
        bucket: simple_django
        path: litestream # change to whatever path you want
        endpoint: s3.us-west-000.backblazeb2.com # change this
        force-path-style: true
